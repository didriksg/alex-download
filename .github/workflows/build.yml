name: Build Windows exe

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yt-dlp[default]" customtkinter pyinstaller

      - name: Fetch ffmpeg
        shell: pwsh
        run: |
          curl.exe -L -o ffmpeg.zip https://github.com/yt-dlp/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-gpl.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg
          Copy-Item ffmpeg/*/bin/ffmpeg.exe .

      - name: Fetch deno
        shell: pwsh
        run: |
          curl.exe -L -o deno.zip https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip
          Expand-Archive deno.zip -DestinationPath denodir
          Copy-Item denodir/deno.exe .

      - name: Set version
        shell: pwsh
        run: |
          Set-Content _version.py "VERSION = $env:GITHUB_RUN_NUMBER"
          @"
          VSVersionInfo(
            ffi=FixedFileInfo(filevers=(1, 0, $env:GITHUB_RUN_NUMBER, 0), prodvers=(1, 0, $env:GITHUB_RUN_NUMBER, 0)),
            kids=[
              StringFileInfo([StringTable('040904B0', [
                StringStruct('CompanyName', 'Alex Videoer'),
                StringStruct('FileDescription', 'Alex Videoer'),
                StringStruct('ProductName', 'Alex Videoer'),
                StringStruct('FileVersion', '1.0.$env:GITHUB_RUN_NUMBER.0'),
                StringStruct('ProductVersion', '1.0.$env:GITHUB_RUN_NUMBER.0'),
                StringStruct('OriginalFilename', 'Alex Videoer.exe')])]),
              VarFileInfo([VarStruct('Translation', [1033, 1200])])
            ]
          )
          "@ | Set-Content version_info.txt

      - name: Build exe
        run: >
          pyinstaller --onefile --windowed --name "Alex Videoer" --icon icon.ico
          --version-file version_info.txt
          --add-binary "ffmpeg.exe;." --add-binary "deno.exe;." --add-data "icon.ico;."
          --collect-all customtkinter --collect-all yt_dlp_ejs
          alex_videoer.py

      - name: Build installer
        shell: pwsh
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DAppVersion=$env:GITHUB_RUN_NUMBER installer.iss

      - name: Build MSIX for the Microsoft Store
        if: vars.MSIX_IDENTITY_NAME != ''
        shell: pwsh
        env:
          IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
          PUBLISHER_DISPLAY: ${{ vars.MSIX_PUBLISHER_DISPLAY }}
        run: |
          pip install pillow
          New-Item -ItemType Directory -Force msix/Assets | Out-Null
          Copy-Item "dist/Alex Videoer.exe" msix/
          python -c "from PIL import Image; im = Image.open('icon.png').convert('RGBA'); [im.resize((s, s)).save(f'msix/Assets/{n}.png') for s, n in [(150, 'Square150x150Logo'), (44, 'Square44x44Logo'), (50, 'StoreLogo')]]"
          (Get-Content AppxManifest.xml) `
            -replace '__IDENTITY_NAME__', $env:IDENTITY_NAME `
            -replace '__PUBLISHER__', $env:PUBLISHER `
            -replace '__PUBLISHER_DISPLAY__', $env:PUBLISHER_DISPLAY `
            -replace '__RUN__', $env:GITHUB_RUN_NUMBER | Set-Content msix/AppxManifest.xml
          $makeappx = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\makeappx.exe" | Select-Object -Last 1
          & $makeappx pack /o /d msix /p "Alex Videoer.msix"

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @("dist/Alex Videoer.exe", "installer/AlexVideoerSetup.exe")
          if (Test-Path "Alex Videoer.msix") { $assets += "Alex Videoer.msix" }
          gh release create "v$env:GITHUB_RUN_NUMBER" @assets `
            --title "Alex Videoer v$env:GITHUB_RUN_NUMBER" --notes "Automated build"
